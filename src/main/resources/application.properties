# Nombre de tu app
spring.application.name=CrudGyl
server.port=8081

# CONFIGURACIÓN DE BASE DE DATOS (Asegurate que estos datos sean correctos)
# Reemplaza 'producto_gyl' por el nombre exacto de tu esquema en MySQL Workbench
spring.datasource.url=jdbc:mysql://localhost:3306/producto_gyl
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACIÓN JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect